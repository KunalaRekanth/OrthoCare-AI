name: Backend Security Review

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: 'ortho app'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci
        working-directory: 'ortho app'

      - name: Run Backend Security Suite
        working-directory: 'ortho app/packages/backend'
        env:
          NODE_PATH: ../../node_modules
        run: |
          node scripts/generateSecuritySuite.js
          cat executive-summary.md >> $GITHUB_STEP_SUMMARY
          cat security-review.md >> $GITHUB_STEP_SUMMARY
          
          # Enforce Zero-Critical Security Policy
          CRITICAL_COUNT=$(grep -oE '[0-9]+ Critical' executive-summary.md | awk '{print $1}')
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "Security Gate Failed: Found $CRITICAL_COUNT Critical vulnerabilities!"
            exit 1
          fi
          echo "Security Gate Passed: 0 Critical vulnerabilities found."

      - name: Upload Security Findings Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-security-findings
          path: ortho app/packages/backend/findings.xlsx
